server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: hub-service
              uri: lb://HUB-SERVICE
              predicates:
                - Path=/api/v1/hubs, /api/v1/hubs/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**

            - id: delivery-service
              uri: lb://DELIVERY-SERVICE
              predicates:
                - Path=/api/v1/deliveries/**
                - Path=/api/v1/deliveryroute/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/admin/**
                - Path=/api/v1/users/**
                - Path=/api/v1/auth/**

            - id: company-service
              uri: lb://COMPANY-SERVICE
              predicates:
                - Path=/api/v1/companies/**
                - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order,/order/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
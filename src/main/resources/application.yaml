server:
  port: 8090

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-server
              uri: http://order-server:19010
              predicates:
                - Path=/api/v1/orders/**

            - id: delivery-server
              uri: http://delivery-server:19020
              predicates:
                - Path=/api/v1/deliveries/**, /api/v1/deliveryroute/**

            - id: user-server
              uri: http://user-server:19030
              predicates:
                - Path=/api/v1/admin/**, /api/v1/users/**, /api/v1/auth/**

            - id: hub-server
              uri: http://hub-server:19040
              predicates:
                - Path=/api/v1/hubs/**

            - id: company-server
              uri: http://company-server:19050
              predicates:
                - Path=/api/v1/companies/**, /api/v1/products/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
